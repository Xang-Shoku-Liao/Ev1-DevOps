name: Integracion Continua (CI)

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - main

jobs:
  pruebas:
    name: Ejecutar pruebas del microservicio
    runs-on: ubuntu-latest
    
    steps:
      # Paso 1: Clonar el código en el servidor de GitHub
      - name: Obtener el código fuente
        uses: actions/checkout@v3

      # Paso 2: Simulación de instalación y pruebas (CI)
      - name: Ejecutar pruebas automáticas
        run: |
          echo "Iniciando la construcción del microservicio..."
          echo "Ejecutando pruebas unitarias..."
          echo "✅ Todas las pruebas pasaron con éxito."